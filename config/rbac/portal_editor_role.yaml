# This rule is not used by the project lighthouse itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the idp.osura.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: lighthouse
    app.kubernetes.io/managed-by: kustomize
  name: portal-editor-role
rules:
- apiGroups:
  - idp.osura.dev
  resources:
  - portals
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - idp.osura.dev
  resources:
  - portals/status
  verbs:
  - get
